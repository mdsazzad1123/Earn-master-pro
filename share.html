<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer & Earn - EarnMaster Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-image: url('https://i.postimg.cc/BZr3jn2F/79b94cde2352f5d6099840bd0ce926a2.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; overflow: hidden;
        }

        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-container { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .proc-9 { 
            width: 80px; height: 80px; position: relative; border: 2px solid rgba(0, 200, 83, 0.1); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #fff;
        }
        .loader-img { width: 45px; height: 45px; filter: drop-shadow(0 5px 10px rgba(0, 200, 83, 0.5)); }
        .proc-9::before { 
            content: ""; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; 
            border: 3px solid #00c853; border-radius: 50%; animation: trace 2s linear infinite; clip-path: inset(0 0 95% 0); 
        }
        .proc-3 { color: #00c853; font-weight: bold; font-size: 20px; }
        .proc-3:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes trace { 0% { clip-path: inset(0 0 95% 0); } 25% { clip-path: inset(0 95% 0 0); } 50% { clip-path: inset(95% 0 0 0); } 75% { clip-path: inset(0 0 0 95%); } 100% { clip-path: inset(0 0 95% 0); } }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: #00c853; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 #00c853, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 #00c853, 1em 0 0 #00c853; } }

        .container { 
            width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.96); 
            height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column;
        }
        
        .fixed-top-content { flex-shrink: 0; }

        .header { background-color: #00a651; color: white; padding: 18px; display: flex; align-items: center; font-size: 18px; font-weight: bold; }
        .header i { margin-right: 15px; cursor: pointer; font-size: 20px; }

        .reward-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .reward-box-mini { 
            background: linear-gradient(135deg, #00a651, #008148); 
            color: white; padding: 18px 10px; border-radius: 18px; text-align: center; 
            box-shadow: 0 6px 15px rgba(0,166,81,0.25);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .reward-box-mini p { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 5px; }
        .reward-box-mini h3 { font-size: 18px; font-weight: 800; margin-bottom: 10px; }

        .btn-claim-mini { 
            background: #ffffff; color: #00a651; border: none; padding: 5px 15px; 
            border-radius: 30px; font-size: 10px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: 0.2s; min-width: 70px;
        }
        .btn-claim-mini:active { transform: scale(0.9); }
        .btn-claim-mini:disabled { background: rgba(255,255,255,0.5); color: #666; cursor: not-allowed; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #f0f0f0; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .stat-item div { font-size: 20px; font-weight: bold; color: #00a651; }
        .stat-item span { font-size: 11px; color: #777; font-weight: 500; }

        .code-box { background: #f9fbf9; margin: 0 20px; padding: 15px; border-radius: 15px; border: 2px dashed #00a651; text-align: center; position: relative; }
        .code-box label { font-size: 11px; color: #666; display: block; margin-bottom: 8px; font-weight: bold; }
        
        /* রেফার লিংক বক্সের স্টাইল */
        .link-container {
            background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 10px;
            font-size: 12px; color: #555; word-break: break-all; margin-bottom: 10px;
            display: block; text-align: left; line-height: 1.4;
        }

        .copy-btn-inner {
            background: #00a651; color: white; border: none; padding: 8px 20px;
            border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer;
            transition: 0.3s; width: 100%;
        }

        .invite-btn { background: #00a651; color: white; margin: 20px; padding: 16px; border-radius: 15px; text-align: center; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; text-decoration: none; box-shadow: 0 5px 15px rgba(0,166,81,0.2); }

        .list-section { padding: 0 20px; flex-grow: 1; overflow-y: auto; padding-bottom: 30px; }
        .list-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 15px; border-left: 4px solid #00a651; padding-left: 10px; position: sticky; top: 0; background: rgba(255,255,255,0.96); z-index: 5; padding-top: 5px; }
        .referral-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; }
        .user-info b { font-size: 14px; color: #333; display: block; }
        .user-info span { font-size: 11px; color: #888; }
        .status-badge { font-size: 10px; font-weight: bold; padding: 4px 10px; border-radius: 6px; }
        .tag-active { background: #e8f5e9; color: #2e7d32; }
        .tag-pending { background: #fff3e0; color: #ef6c00; }
    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="loader-container">
        <div class="proc-9"><img src="https://i.postimg.cc/DZsMDGyR/images-(8).png" class="loader-img"></div>
        <span class="proc-3">Processing</span>
    </div>
</div>

<div class="container">
    <div class="fixed-top-content">
        <div class="header">
            <i class="fa-solid fa-arrow-left" onclick="navigateWithAnimation('home.html')"></i>
            <div style="flex-grow: 1; text-align: center; margin-right: 35px;">Refer & Earn</div>
        </div>

        <div class="reward-section">
            <div class="reward-box-mini">
                <p>Monthly History</p>
                <h3 id="monthlyBonus">৳ 0.00</h3>
                <span style="font-size: 9px; opacity: 0.8;">Last 30 Days Earned</span>
            </div>
            <div class="reward-box-mini">
                <p id="commLabel">Commission (0%)</p>
                <h3 id="commissionEarn">৳ 0.00</h3>
                <button class="btn-claim-mini" id="claimCommBtn" onclick="claimCommission()">CLAIM</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div id="totalInvites">0</div>
                <span>Total Invites</span>
            </div>
            <div class="stat-item">
                <div id="activeInvites">0</div>
                <span>Active Users</span>
            </div>
        </div>

        <div class="code-box">
            <label>YOUR REFERRAL LINK</label>
            <div class="link-container" id="displayReferLink">Generating link...</div>
            <button class="copy-btn-inner" id="copyBtn" onclick="copyFullLink()">
                <i class="fa-regular fa-copy"></i> COPY LINK
            </button>
        </div>

        <div class="invite-btn" onclick="shareLink()">
            <i class="fa-solid fa-share-nodes"></i> INVITE FRIENDS
        </div>
    </div>

    <div class="list-section">
        <div class="list-title">My Referrals</div>
        <div id="referralList">
            <p style="text-align:center; color:#999; font-size:13px; margin-top: 20px;">No referrals found.</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD-XRUDILxlkOQk4bbpkajLFaRmCVeMxEk",
        authDomain: "test-54fa2.firebaseapp.com",
        projectId: "test-54fa2",
        appId: "1:496937911936:web:5f48c8712f58f2e26fc865"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const currentUserId = localStorage.getItem('currentUserId');
    const overlay = document.getElementById('loader-overlay');

    window.navigateWithAnimation = (url) => {
        overlay.style.display = 'flex';
        setTimeout(() => { window.location.href = url; }, 800);
    };

    async function loadData() {
        if(!currentUserId) return;
        
        try {
            const settingsSnap = await getDoc(doc(db, "settings", "commissions"));
            if (settingsSnap.exists()) {
                const commVal = settingsSnap.data().depositComm || 0;
                document.getElementById('commLabel').innerText = `Commission (${commVal}%)`;
            }

            const userSnap = await getDoc(doc(db, "users", currentUserId));
            if (userSnap.exists()) {
                const userData = userSnap.data();
                const myCode = userData.myReferCode || "N/A";
                
                // লিংকের বক্স আপডেট
                const fullUrl = `${window.location.origin}/Register.html?ref=${myCode}`;
                document.getElementById('displayReferLink').innerText = fullUrl;

                document.getElementById('monthlyBonus').innerText = "৳ " + (userData.totalMonthlyEarn || 0).toFixed(2);
                document.getElementById('commissionEarn').innerText = "৳ " + (userData.pendingCommission || 0).toFixed(2);
                document.getElementById('claimCommBtn').disabled = (userData.pendingCommission || 0) <= 0;

                const q = query(collection(db, "users"), where("referBy", "==", myCode));
                const querySnapshot = await getDocs(q);
                
                const listContainer = document.getElementById('referralList');
                let inviteCount = 0;
                let activeCount = 0;

                if (!querySnapshot.empty) {
                    listContainer.innerHTML = "";
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        inviteCount++;
                        if(data.status === "active") activeCount++;
                        const item = document.createElement('div');
                        item.className = 'referral-item';
                        item.innerHTML = `<div class="user-info"><b>${data.name || 'Investor'}</b><span>${data.phone ? data.phone.substring(0,5)+'***' : 'Unknown'}</span></div><span class="status-badge ${data.status === "active" ? 'tag-active' : 'tag-pending'}">${data.status === "active" ? 'ACTIVE' : 'PENDING'}</span>`;
                        listContainer.appendChild(item);
                    });
                }
                document.getElementById('totalInvites').innerText = inviteCount;
                document.getElementById('activeInvites').innerText = activeCount;
            }
        } catch (e) { console.error(e); }
    }

    window.copyFullLink = () => {
        const link = document.getElementById('displayReferLink').innerText;
        const btn = document.getElementById('copyBtn');
        
        navigator.clipboard.writeText(link).then(() => {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> COPIED!';
            btn.style.backgroundColor = "#27ae60";
            
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.style.backgroundColor = "#00a651";
            }, 2000);
        });
    };

    window.shareLink = async () => {
        const link = document.getElementById('displayReferLink').innerText;
        if (navigator.share) {
            navigator.share({ title: 'EarnMaster Pro', text: 'Join now and earn commission!', url: link });
        } else {
            window.copyFullLink();
        }
    };

    window.claimCommission = async () => {
        const btn = document.getElementById('claimCommBtn');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
        try {
            const userRef = doc(db, "users", currentUserId);
            const userSnap = await getDoc(userRef);
            const amount = userSnap.data().pendingCommission || 0;
            if(amount > 0) {
                await updateDoc(userRef, { balance: increment(amount), pendingCommission: 0, totalMonthlyEarn: increment(amount) });
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Success';
                setTimeout(() => { btn.innerHTML = originalText; loadData(); }, 2000);
            }
        } catch (e) { btn.disabled = false; btn.innerHTML = originalText; }
    };

    loadData();
</script>
</body>
</html>
