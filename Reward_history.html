<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reward History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        if (!localStorage.getItem('currentUserId')) {
            // .html এক্সটেনশন ছাড়া রিডাইরেক্ট
            window.location.href = 'login';
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-image: url('https://i.postimg.cc/BZr3jn2F/79b94cde2352f5d6099840bd0ce926a2.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; 
            height: 100vh; overflow: hidden;
        }

        /* --- সিগনেচার এনিমেশন --- */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(5px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-container { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .proc-9 { 
            width: 80px; height: 80px; position: relative; border: 2px solid rgba(0, 200, 83, 0.1); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #fff;
        }
        .loader-img { width: 45px; height: 45px; filter: drop-shadow(0 5px 10px rgba(0, 200, 83, 0.5)); }
        .proc-9::before { 
            content: ""; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; 
            border: 3px solid #00c853; border-radius: 50%; animation: trace 2s linear infinite; clip-path: inset(0 0 95% 0); 
        }
        .proc-3 { color: #00c853; font-weight: bold; font-size: 20px; }
        .proc-3:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes trace { 0% { clip-path: inset(0 0 95% 0); } 25% { clip-path: inset(0 95% 0 0); } 50% { clip-path: inset(95% 0 0 0); } 75% { clip-path: inset(0 0 0 95%); } 100% { clip-path: inset(0 0 95% 0); } }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: #00c853; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 #00c853, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 #00c853, 1em 0 0 #00c853; } }

        .container { 
            width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.95); 
            height: 100vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.1); 
        }
        .header { background-color: #00a651; color: white; padding: 15px; display: flex; align-items: center; font-size: 18px; font-weight: bold; flex-shrink: 0; }
        .header i { margin-right: 15px; cursor: pointer; }

        .history-list { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .history-item { 
            background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .info h4 { color: #333; font-size: 14px; margin-bottom: 4px; }
        .info p { color: #888; font-size: 11px; }
        .amount { 
            background: #f0fdf4; color: #00a651; padding: 5px 12px; 
            border-radius: 20px; font-weight: bold; font-size: 14px;
        }

        .no-data { text-align: center; margin-top: 50px; color: #999; font-size: 14px; }
        .no-data i { font-size: 40px; margin-bottom: 15px; display: block; color: #ddd; }
    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="loader-container">
        <div class="proc-9"><img src="https://i.postimg.cc/DZsMDGyR/images-(8).png" class="loader-img"></div>
        <span class="proc-3">Processing</span>
    </div>
</div>

<div class="container">
    <div class="header">
        <i class="fa-solid fa-arrow-left" onclick="navigateWithAnimation('gift')"></i>
        <div style="flex-grow: 1; text-align: center; margin-right: 30px;">Reward History</div>
    </div>

    <div class="history-list" id="historyContainer">
        <div class="no-data"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD-XRUDILxlkOQk4bbpkajLFaRmCVeMxEk",
        authDomain: "test-54fa2.firebaseapp.com",
        projectId: "test-54fa2",
        appId: "1:496937911936:web:5f48c8712f58f2e26fc865"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const userId = localStorage.getItem('currentUserId');
    const loaderOverlay = document.getElementById('loader-overlay');

    window.navigateWithAnimation = (url) => {
        loaderOverlay.style.display = 'flex';
        // এখানে url এর শেষে .html এক্সটেনশন ছাড়াই কাজ করবে
        setTimeout(() => { window.location.href = url; }, 800);
    };

    async function loadRewardHistory() {
        const container = document.getElementById('historyContainer');
        try {
            const q = query(
                collection(db, "reward_history"), 
                where("userId", "==", userId)
            );
            
            const querySnapshot = await getDocs(q);
            container.innerHTML = "";

            if (querySnapshot.empty) {
                container.innerHTML = `
                    <div class="no-data">
                        <i class="fa-solid fa-gift"></i>
                        No rewards claimed yet.
                    </div>`;
                return;
            }

            let histories = [];
            querySnapshot.forEach((doc) => {
                histories.push(doc.data());
            });

            histories.sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));

            histories.forEach((data) => {
                const date = data.date ? data.date.toDate().toLocaleString('en-GB', { 
                    day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' 
                }) : "Just now";
                
                container.innerHTML += `
                    <div class="history-item">
                        <div class="info">
                            <h4>Code: ${data.code}</h4>
                            <p><i class="far fa-calendar-alt"></i> ${date}</p>
                        </div>
                        <div class="amount">+ ৳${data.amount}</div>
                    </div>
                `;
            });
        } catch (e) {
            console.error("History Error:", e);
            container.innerHTML = '<div class="no-data">Failed to load history.</div>';
        }
    }

    loadRewardHistory();
</script>

</body>
</html>
